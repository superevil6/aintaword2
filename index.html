<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1220" />

    <!-- Root share: someone sharing the site itself, not one game. This blurb is
         the SITE_SHARE entry in src/shareManifest.js, repeated here as literal
         text because a crawler reads this file without running any JS. Per-game
         links get their own preview pages from scripts/share-pages.js. -->
    <title>Word Games</title>
    <meta
      name="description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into colour, and more."
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Word Games" />
    <meta property="og:title" content="Word Games" />
    <meta
      property="og:description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into colour, and more."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Word Games" />
    <meta
      name="twitter:description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into colour, and more."
    />
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1220" />

    <!-- Favicon set (generated by scripts/build-og.mjs → public/). SVG first for
         crisp modern tabs, PNG + apple-touch as fallbacks. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Apply the saved theme before first paint so there's no flash of the
         default palette. Gating is re-checked in JS (core/theme.js initTheme);
         this only sets the attribute the CSS keys off. -->
    <script>
      try {
        var t = localStorage.getItem("aintaword2:theme");
        if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>

    <!-- Root share: someone sharing the site itself, not one game. This blurb is
         the SITE_SHARE entry in src/shareManifest.js, repeated here as literal
         text because a crawler reads this file without running any JS. Per-game
         links get their own preview pages from scripts/share-pages.js. -->
    <title>Wordems</title>
    <meta
      name="description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into color, and more."
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wordems" />
    <meta property="og:title" content="Wordems" />
    <meta property="og:url" content="https://wordems.com/" />
    <meta
      property="og:description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into color, and more."
    />
    <!-- Link-preview image (public/og/site.png). An absolute URL — Facebook and
         others require one — so it is the SITE_URL from src/config.js written as
         a literal here, the same way this file's title and description are, for
         a crawler that never runs the page's JS. Keep it in step with SITE_URL. -->
    <meta property="og:image" content="https://wordems.com/og/site.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Wordems — a collection of daily puzzle games" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wordems" />
    <meta
      name="twitter:description"
      content="A small collection of daily puzzle games — a fresh board every day for each. Spot the fake word, mix light into color, and more."
    />
    <meta name="twitter:image" content="https://wordems.com/og/site.png" />
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

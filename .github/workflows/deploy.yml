name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fast guard: don't publish a build whose word generator is broken.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          # Turns Pages on automatically the first time, so there's no manual
          # step in repo Settings.
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

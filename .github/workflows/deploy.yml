name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fast guard: don't publish a build whose word generator is broken.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # NOTE: no `enablement: true` here. It calls the Pages *creation* API,
      # which the default GITHUB_TOKEN generally lacks permission for, so the
      # step fails on a repo where Pages has never been turned on. Enable it
      # once by hand instead:
      #   Settings → Pages → Build and deployment → Source: "GitHub Actions"
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

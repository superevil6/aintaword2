<!DOCTYPE html>
<!-- Served by Cloudflare Pages for any unknown path. In-app "unknown game"
     URLs (?game=…) are handled by the SPA itself; this is for real 404s. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1220" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <title>Page not found · Wordems</title>
    <link rel="stylesheet" href="/legal.css" />
    <style>
      .nf { min-height: 70vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center; gap: 0.4rem; }
      .nf .code { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
      .nf p { color: #a6abcf; margin: 0 0 1.5rem; }
      .nf a.home { display: inline-block; padding: 0.65rem 1.4rem; border-radius: 10px;
        background: #7c5cff; color: #fff; text-decoration: none; font-weight: 700; }
      .nf a.home:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="legal-wrap">
      <div class="nf">
        <p class="code">404</p>
        <h1>Page not found</h1>
        <p>That page doesn't exist — but there's a puzzle waiting.</p>
        <a class="home" href="/">Play the games →</a>
      </div>
    </div>
  </body>
</html>
